<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1a1c2c">
  <title>冲塔跑酷 · 轻量版</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="game-wrap">
    <canvas id="game"></canvas>
    <div id="hud" class="hud hidden">
      <div class="hud-left">
        <span id="score">0m</span>
        <span id="coins">0</span>
      </div>
      <div class="hud-right">
        <span id="jumps" class="jumps-dots"><i class="on"></i><i class="on"></i></span>
        <span id="best">BEST 0m</span>
      </div>
    </div>
    <div id="controls" class="controls hidden">
      <button id="btn-slide" type="button">滑</button>
      <button id="btn-jump" type="button">跳</button>
    </div>
  </div>

  <div id="screen-title" class="screen">
    <h1>冲塔跑酷</h1>
    <p>轻量版 · 竖屏跑酷</p>
    <ul>
      <li>「跳」— 二段跳越石头</li>
      <li>「滑」— 钻过横杆、躲飞鸟</li>
      <li>吃金币加分，跑满 1000m 通关</li>
    </ul>
    <button id="btn-start" type="button">开始奔跑</button>
  </div>

  <div id="screen-over" class="screen hidden">
    <h2 id="over-title">撞到了!</h2>
    <p id="over-score">0m</p>
    <p id="over-coins" class="sub-stat"></p>
    <button id="btn-retry" type="button">再来一次</button>
  </div>

  <div id="screen-win" class="screen hidden">
    <h2>通关!</h2>
    <p id="win-coins" class="sub-stat"></p>
    <p class="win-msg">AAA你黄哥最牛</p>
    <button id="btn-win-retry" type="button">再跑一趟</button>
  </div>

  <script src="js/game.js"></script>
</body>
</html>
