<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#2563eb">
  <title>习题集 · 即测即评</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body data-theme="blue">
  <div id="app">
    <!-- 选题首页 -->
    <section id="screen-hub" class="screen active">
      <div class="hero hub-hero">
        <div class="hero-icon">📝</div>
        <h1>习题集 · 即测即评</h1>
        <p class="subtitle">选择一个习题集开始练习</p>
        <div id="quiz-cards" class="quiz-cards"></div>
      </div>
    </section>

    <!-- 答题页 -->
    <section id="screen-quiz" class="screen">
      <header class="quiz-header">
        <button id="btn-back-hub" class="btn-back" type="button">← 返回</button>
        <div class="progress-wrap">
          <div class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
          </div>
          <span id="progress-text" class="progress-text">1 / 100</span>
        </div>
        <div class="meta-row">
          <span id="q-type" class="badge">单选题</span>
          <span id="quiz-title" class="chapter"></span>
        </div>
        <div class="meta-row">
          <span id="q-chapter" class="chapter"></span>
        </div>
      </header>

      <main class="quiz-body">
        <h2 id="q-stem" class="question-stem"></h2>
        <div id="options" class="options"></div>
      </main>

      <footer class="quiz-footer">
        <button id="btn-submit" class="btn btn-primary" disabled>确认答案</button>
      </footer>
    </section>

    <!-- 答错弹层 -->
    <div id="modal-wrong" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-card wrong-card">
        <div class="modal-icon">✗</div>
        <h3>回答错误</h3>
        <div class="answer-compare">
          <p><strong>你的答案：</strong><span id="wrong-user-answer"></span></p>
          <p><strong>正确答案：</strong><span id="wrong-correct-answer" class="correct-text"></span></p>
        </div>
        <button id="btn-wrong-next" class="btn btn-primary">继续下一题</button>
      </div>
    </div>

    <!-- 答对提示 -->
    <div id="toast-correct" class="toast hidden">
      <span>✓ 回答正确</span>
    </div>

    <!-- 结果页 -->
    <section id="screen-result" class="screen">
      <div class="result-hero">
        <div id="result-score-circle" class="score-circle">
          <span id="result-score">0</span>
          <small>分</small>
        </div>
        <h2>答题完成</h2>
        <p id="result-set-name" class="result-set-name"></p>
        <p id="result-summary" class="result-summary"></p>
      </div>

      <div id="wrong-section" class="wrong-section hidden">
        <h3>错题汇总（<span id="wrong-count">0</span> 题）</h3>
        <div id="wrong-list" class="wrong-list"></div>
      </div>

      <div id="perfect-msg" class="perfect-msg hidden">
        <div class="perfect-icon">🎉</div>
        <p>全部答对，太棒了！</p>
      </div>

      <button id="btn-restart" class="btn btn-primary btn-lg">重新答题</button>
      <button id="btn-back-hub-result" class="btn btn-secondary btn-lg">返回选题</button>
    </section>
  </div>

  <script src="data/questions.js"></script>
  <script src="data/marxism-questions.js"></script>
  <script src="data/quiz-sets.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
