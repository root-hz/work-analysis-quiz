<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#b91c1c">
  <title>马克思主义基本原理 · 即测即评</title>
  <link rel="stylesheet" href="../css/app.css">
  <link rel="stylesheet" href="../css/marxism.css">
</head>
<body>
  <div id="app">
    <section id="screen-home" class="screen active">
      <div class="hero">
        <div class="hero-icon">📖</div>
        <h1>马克思主义基本原理</h1>
        <p class="subtitle">26年春季练习题 · 即测即评</p>
        <ul class="info-list">
          <li>单选题 158 · 多选题 104 · 共 262 题</li>
          <li>答错即时显示正确答案</li>
          <li>完成后汇总错题并评分</li>
          <li>无时间限制，可随时暂停</li>
        </ul>
        <button id="btn-start" class="btn btn-primary btn-lg">开始答题</button>
        <a href="../index.html" class="link-other">← 返回工作分析习题集</a>
      </div>
    </section>

    <section id="screen-quiz" class="screen">
      <header class="quiz-header">
        <div class="progress-wrap">
          <div class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
          </div>
          <span id="progress-text" class="progress-text">1 / 262</span>
        </div>
        <div class="meta-row">
          <span id="q-type" class="badge">单选题</span>
          <span id="q-chapter" class="chapter"></span>
        </div>
      </header>

      <main class="quiz-body">
        <h2 id="q-stem" class="question-stem"></h2>
        <div id="options" class="options"></div>
      </main>

      <footer class="quiz-footer">
        <button id="btn-submit" class="btn btn-primary" disabled>确认答案</button>
      </footer>
    </section>

    <div id="modal-wrong" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-card wrong-card">
        <div class="modal-icon">✗</div>
        <h3>回答错误</h3>
        <div class="answer-compare">
          <p><strong>你的答案：</strong><span id="wrong-user-answer"></span></p>
          <p><strong>正确答案：</strong><span id="wrong-correct-answer" class="correct-text"></span></p>
        </div>
        <button id="btn-wrong-next" class="btn btn-primary">继续下一题</button>
      </div>
    </div>

    <div id="toast-correct" class="toast hidden">
      <span>✓ 回答正确</span>
    </div>

    <section id="screen-result" class="screen">
      <div class="result-hero">
        <div id="result-score-circle" class="score-circle">
          <span id="result-score">0</span>
          <small>分</small>
        </div>
        <h2>答题完成</h2>
        <p id="result-summary" class="result-summary"></p>
      </div>

      <div id="wrong-section" class="wrong-section hidden">
        <h3>错题汇总（<span id="wrong-count">0</span> 题）</h3>
        <div id="wrong-list" class="wrong-list"></div>
      </div>

      <div id="perfect-msg" class="perfect-msg hidden">
        <div class="perfect-icon">🎉</div>
        <p>全部答对，太棒了！</p>
      </div>

      <button id="btn-restart" class="btn btn-primary btn-lg">重新答题</button>
    </section>
  </div>

  <script src="../data/marxism-questions.js"></script>
  <script src="../js/marxism-app.js"></script>
</body>
</html>
